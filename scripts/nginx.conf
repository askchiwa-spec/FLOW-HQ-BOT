# Chatisha nginx config
# Deploy to: /etc/nginx/sites-available/chatisha
# Enable with: ln -s /etc/nginx/sites-available/chatisha /etc/nginx/sites-enabled/chatisha
# Then: nginx -t && systemctl reload nginx

# ─── Redirect HTTP → HTTPS for all domains ───────────────────────────────────
server {
    listen 80;
    server_name chatisha.com www.chatisha.com app.chatisha.com admin.chatisha.com;
    return 301 https://$host$request_uri;
}

# ─── chatisha.africa + www — Marketing site ──────────────────────────────────
server {
    listen 443 ssl;
    server_name chatisha.com www.chatisha.com;

    ssl_certificate     /etc/letsencrypt/live/chatisha.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatisha.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── app.chatisha.africa — Customer portal ───────────────────────────────────
server {
    listen 443 ssl;
    server_name app.chatisha.com;

    ssl_certificate     /etc/letsencrypt/live/chatisha.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatisha.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── admin.chatisha.africa — Control plane / admin dashboard ─────────────────
server {
    listen 443 ssl;
    server_name admin.chatisha.com;

    ssl_certificate     /etc/letsencrypt/live/chatisha.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatisha.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Extra protection — restrict to your IP if possible
    # allow YOUR.IP.HERE;
    # deny all;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        proxy_pass         http://localhost:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
