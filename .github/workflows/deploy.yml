name: Deploy

on:
  # Trigger only after CI workflow completes successfully on main
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  # Allow manual trigger from GitHub UI regardless of CI
  workflow_dispatch:

# Only the latest deploy runs — cancel any queued ones so rapid pushes don't pile up
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # For workflow_run trigger: only proceed if CI passed.
    # For workflow_dispatch (manual): always proceed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            bash scripts/deploy.sh

      - name: Notify success
        if: success()
        run: echo "Deployment to production completed successfully."

      - name: Notify failure
        if: failure()
        run: echo "Deployment failed. Check the SSH logs above."
